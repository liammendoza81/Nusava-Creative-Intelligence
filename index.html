<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nusava Creator Intelligence Platform — Multi-agency TikTok Shop affiliate performance dashboard">

  <!-- Tell well-behaved browsers to revalidate before serving cached files.
       Combined with the ?v=3 query strings on script/CSS URLs, this keeps the
       dashboard fresh without bumping version numbers on each push. -->
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">

  <title>nusava · Creator Intelligence</title>

  <!-- Brand fonts: Source Sans 3 (headings) + Fira Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Fira+Sans:wght@300;400;500;600&display=swap">

  <link rel="stylesheet" href="css/style.css?v=3">
  <!-- Favicon: charcoal block with white "n" — matches the wordmark -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23222222'/><text x='50%25' y='62%25' dominant-baseline='middle' text-anchor='middle' font-family='Source Sans 3, sans-serif' font-size='22' font-weight='700' fill='white' letter-spacing='-1'>n</text></svg>">
</head>
<body>

<div id="app">

  <!-- ── Site Header ── -->
  <header id="site-header">
    <!-- Built by app.js: buildHeader() -->
  </header>

  <!-- ── Agency Navigation Bar ── -->
  <nav id="agency-nav" role="navigation" aria-label="Agency navigation">
    <!-- Built by app.js: buildNav() -->
  </nav>

  <!-- ── Time Filter Bar ── -->
  <div id="time-filter" role="toolbar" aria-label="Time range selector">
    <!-- Built by app.js: buildTimeFilter() -->
  </div>

  <!-- ── Main Content Area ── -->
  <main id="main-content" role="main">
    <!-- Rendered by Views.executive.render() or Views.agency.render(agencyId) -->
    <div class="empty-state">
      <h3>Loading platform…</h3>
      <p>Initializing charts and data.</p>
    </div>
  </main>

</div><!-- #app -->

<!-- ════════════════════════════════════════════════════
     Script Load Order — CRITICAL: do not reorder
     All files use window.* globals, no ES modules.
     ════════════════════════════════════════════════════ -->

<!-- 1. Chart.js (must load before any chart code) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- 2. Platform configuration -->
<script src="js/config.js?v=3"></script>

<!-- 3. Utility functions (depends on config.js) -->
<script src="js/utils.js?v=3"></script>

<!-- 3b. TikTok dashboard utils (registers window.Utils, separate from window.U) -->
<script src="js/tiktok_utils.js?v=3"></script>

<!-- 4. Chart helpers (depends on config.js + utils.js) -->
<script src="js/charts.js?v=3"></script>

<!-- 5. Agency data files (independent, loaded before views) -->
<script src="data/creatify.js?v=3"></script>
<script src="data/thc.js?v=3"></script>
<script src="data/elle-media.js?v=3"></script>
<script src="data/internal-retainers.js?v=3"></script>
<script src="data/weekly-tiktok.js?v=3"></script>

<!-- 5b. TikTok deep-dive dataset (regenerated by weekly pipeline) -->
<script src="data/dashboard.js?v=3"></script>

<!-- 5c. Per-SKU video + GMV rollup (regenerated by sku_videos parser) -->
<script src="data/sku-videos.js?v=3"></script>

<!-- 5d. Weekly sampling data (regenerated by sampling parser) -->
<script src="data/sampling.js?v=3"></script>

<!-- 5e. Video lifecycle bell curve (regenerated by lifecycle analyzer) -->
<script src="data/video-lifecycle.js?v=3"></script>

<!-- 5e2. Per-SKU bell curves (B12 / D3K2 / Wellness, by pack size when sample
        permits). Generated by pipeline.parsers.video_lifecycle_by_sku. -->
<script src="data/video-lifecycle-by-sku.js?v=3"></script>

<!-- 5e3. Per-SKU inventory forecast (GMV→Units→Days-of-Supply).
        Generated by pipeline.parsers.sku_forecast. -->
<script src="data/sku-forecast.js?v=3"></script>

<!-- 5f. Per-week KPI archive — drives custom-week selection across all tabs -->
<script src="data/weekly-archive.js?v=3"></script>

<!-- 6. View modules (depend on all of the above) ──
     Per 2026-05 IA restructure: TikTok Forecasting + Search are no longer
     part of this dashboard. Forecasting will live in a separate project.
     The script files are kept on disk for now in case content needs to be
     ported over, but they are no longer loaded. -->
<script src="js/views/executive.js?v=3"></script>
<script src="js/views/agency.js?v=3"></script>
<script src="js/views/evaluation.js?v=3"></script>
<script src="js/views/affiliates.js?v=3"></script>
<script src="js/views/narrative.js?v=3"></script>
<script src="js/views/alerts.js?v=3"></script>
<script src="js/views/gmvlag.js?v=3"></script>
<script src="js/views/incremental.js?v=3"></script>

<!-- 6b. Aggregated agency insights (used by Affiliate Performance summary) -->
<script src="js/views/agency_insights.js?v=3"></script>

<!-- 6c. TikTok weekly section renderers (Creators, Videos, etc. — exposed
        via Views.weekly.renderSectionInto for the AP orchestrator) -->
<script src="js/views/weekly.js?v=3"></script>

<!-- 6d. Affiliate Performance — the engine. Sticky filter bar + 4 sub-tabs:
        Summary | Creators | Videos | Diagnostics. -->
<script src="js/views/affiliate_performance.js?v=3"></script>

<!-- 7. App controller (must be last — calls Views.* on init) -->
<script src="js/app.js?v=3"></script>

</body>
</html>
